name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

env:
  # Pinned, not "latest": twenty-sdk/twenty-client-sdk are pinned to 2.3.0
  # (package.json), last verified back-compat against server v2.7.3. Upstream
  # "latest" has since moved to 2.20+, whose reserved std fields
  # (id/createdAt/searchVector/...) collide with this SDK's manifest and fail
  # Dev sync with ~20 errors — see docs/upgrade/ and the chore/upgrade-twenty-2.20
  # branch for the actual version-bump work. Bump this pin only alongside that.
  TWENTY_VERSION: v2.7.3

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Spawn Twenty test instance
        id: twenty
        uses: twentyhq/twenty/.github/actions/spawn-twenty-app-dev-test@main
        with:
          twenty-version: ${{ env.TWENTY_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run integration tests
        run: yarn test
        env:
          TWENTY_API_URL: ${{ steps.twenty.outputs.server-url }}
          TWENTY_API_KEY: ${{ steps.twenty.outputs.api-key }}
